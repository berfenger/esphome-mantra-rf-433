# Example: mantra_rf_433 — full setup
#
# Two Mantra 433 MHz ceiling fans (R00143 / R00149 family) sharing one bridge,
# each exposing a CCT LED (brightness + 3000K..5000K) and a 6-speed reversible
# fan with Normal / Night / Breeze preset modes. Does NOT cover Mantra's 2.4 GHz
# BLE fans — those use a different protocol entirely.

external_components:
  - source: github://berfenger/esphome-mantra-rf-433
    components: mantra_rf_433

esphome:
  name: example
  devices:
    - id: livingroom_fan_dev
      name: "Living Room Fan"
      area_id: livingroom_area
    - id: bedroom_fan_dev
      name: "Bedroom Fan"
      area_id: bedroom_area
  areas:
    - id: livingroom_area
      name: "Living Room"
    - id: bedroom_area
      name: "Bedroom"

# The bridge attaches as one more listener; existing rc_switch / on_raw
# consumers on the same receiver keep working untouched.
remote_receiver:
  id: rf_rx
  pin: GPIO21
  filter: 150us
  idle: 12ms
  tolerance: 25%

remote_transmitter:
  id: rf_tx
  pin: GPIO22
  carrier_duty_percent: 100%

mantra_rf_433:
  id: rf_bridge
  receiver_id: rf_rx
  transmitter_id: rf_tx
  # Optional: fires for every valid frame seen, even from unconfigured
  # addresses. Useful for discovering an unknown remote's pair address.
  on_frame:
    then:
      - logger.log:
          level: INFO
          tag: "mantra_rx"
          format: "addr=%04X b2=%02X b3=%02X btn=%02X"
          args: ["x.address", "x.flags_k", "x.led_fan", "x.button"]
  # One entry per physical fan. `address` is the 2-byte RF address paired
  # between the original remote and the fan — capture it via on_frame above.
  fans:
    - id: livingroom_fan
      address: 0x1A1B
      repeats: 4               # optional, default 4
    - id: bedroom_fan
      address: 0x2A2B

# CCT LED. Brightness snaps to the device's 10% grid (0x2..0xB = 20..100%).
# Color temperature snaps to 100K steps in [3000K, 5000K].
light:
  - platform: mantra_rf_433
    mantra_id: livingroom_fan
    device_id: livingroom_fan_dev
    name: "Livingroom LED"
  - platform: mantra_rf_433
    mantra_id: bedroom_fan
    device_id: bedroom_fan_dev
    name: "Bedroom LED"

# 6-speed reversible fan. The Normal/Night/Breeze mode is a preset_mode on
# the same fan entity (a dropdown on the fan card). Setting a speed snaps the
# mode back to Normal. `preset_modes:` is optional and relabels the modes for
# localisation; defaults are Normal / Night / Breeze.
fan:
  - platform: mantra_rf_433
    mantra_id: livingroom_fan
    device_id: livingroom_fan_dev
    name: "Living Room Fan"
  - platform: mantra_rf_433
    mantra_id: bedroom_fan
    device_id: bedroom_fan_dev
    name: "Bedroom Fan"
    # Spanish localisation
    preset_modes:
      normal: "Normal"
      night: "Nocturno"
      breeze: "Brisa natural"

# Low-level transmit action: lets YAML / API send arbitrary 6-byte frames.
# Useful for debugging, capture-and-replay, or fans not yet templated.
button:
  - platform: template
    name: "Replay LED Power 0x1A1B"
    on_press:
      then:
        - mantra_rf_433.transmit:
            bridge_id: rf_bridge
            address: 0x1A1B
            flags_k: 0x04        # K_index=4 (3000K), no mode flags, no reverse
            led_fan: 0x86        # LED on + speed off, brightness=0x6 (60%)
            button: 0x01         # LED_POWER (see protocol.h Button namespace)
            repeats: 4           # optional, default 4

# Recovery hook for setups where the fan's AC power is gated by an upstream
# switch (smart plug, relay, etc.). After power returns the fan restores the
# LED but leaves the motor off; have your HA automation call these actions a
# few seconds later to re-transmit the saved state.
api:
  actions:
    - action: resend_livingroom_fan
      then:
        - lambda: 'id(livingroom_fan).resend_state();'
    - action: resend_bedroom_fan
      then:
        - lambda: 'id(bedroom_fan).resend_state();'
